<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    
    .header {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }
    
    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }
    
    .domain {
      font-size: 13px;
      color: #888;
      font-family: 'SF Mono', Monaco, monospace;
      word-break: break-all;
    }
    
    .info {
      margin-bottom: 16px;
      padding: 12px;
      background: #252525;
      border-radius: 6px;
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    
    .info-label {
      color: #999;
    }
    
    .info-value {
      color: #fff;
      font-weight: 500;
    }
    
    button {
      width: 100%;
      padding: 12px;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:hover {
      background: #3a8eef;
    }
    
    button:active {
      transform: scale(0.98);
    }
    
    button:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    
    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
      display: none;
    }
    
    .status.success {
      background: #1a4d2e;
      color: #4ade80;
      border: 1px solid #22c55e;
    }
    
    .status.error {
      background: #4d1a1a;
      color: #f87171;
      border: 1px solid #ef4444;
    }
    
    .status.show {
      display: block;
    }
    
    .footer {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #333;
      text-align: center;
    }
    
    .footer a {
      color: #4a9eff;
      text-decoration: none;
      font-size: 12px;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }

    .config-badge {
      display: none;
      font-size: 11px;
      background: #1a4d2e;
      color: #4ade80;
      border: 1px solid #22c55e;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🍪 Cookie Jar <span class="config-badge" id="configBadge">✓ Configured</span></h1>
    <div class="domain" id="domain">Loading...</div>
  </div>
  
  <div class="info">
    <div class="info-row">
      <span class="info-label">Cookies found:</span>
      <span class="info-value" id="cookieCount">0</span>
    </div>
  </div>
  
  <button id="sendBtn">Send Cookies</button>
  
  <div class="status" id="status"></div>
  
  <div class="footer">
    <a href="options.html" target="_blank">⚙️ Settings</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
